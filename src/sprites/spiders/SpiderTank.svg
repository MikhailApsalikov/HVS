<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="spiderTankBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a5a"/>
      <stop offset="50%" style="stop-color:#2e2e3e"/>
      <stop offset="100%" style="stop-color:#1a1a28"/>
    </linearGradient>
    <linearGradient id="spiderTankLeg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a5a6a"/>
      <stop offset="100%" style="stop-color:#2e2e3e"/>
    </linearGradient>
    <radialGradient id="spiderTankEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffcc00"/>
      <stop offset="70%" style="stop-color:#cc8800"/>
      <stop offset="100%" style="stop-color:#664400"/>
    </radialGradient>
    <linearGradient id="spiderTankArmor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a7a"/>
      <stop offset="50%" style="stop-color:#3e3e4e"/>
      <stop offset="100%" style="stop-color:#2a2a3a"/>
    </linearGradient>
  </defs>
  <!-- Back legs - thick and heavy -->
  <path d="M14 28 Q4 20 0 12" stroke="url(#spiderTankLeg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M50 28 Q60 20 64 12" stroke="url(#spiderTankLeg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M10 34 Q-2 32 -4 24" stroke="url(#spiderTankLeg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M54 34 Q66 32 68 24" stroke="url(#spiderTankLeg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Front legs -->
  <path d="M18 40 Q8 48 4 58" stroke="url(#spiderTankLeg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M46 40 Q56 48 60 58" stroke="url(#spiderTankLeg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M22 42 Q14 52 12 62" stroke="url(#spiderTankLeg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M42 42 Q50 52 52 62" stroke="url(#spiderTankLeg)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Large armored abdomen -->
  <ellipse cx="32" cy="38" rx="20" ry="22" fill="url(#spiderTankBody)"/>
  <!-- Armor plates on abdomen -->
  <path d="M18 30 Q32 26 46 30" stroke="url(#spiderTankArmor)" stroke-width="2" fill="none"/>
  <path d="M16 38 Q32 34 48 38" stroke="url(#spiderTankArmor)" stroke-width="2" fill="none"/>
  <path d="M18 46 Q32 42 46 46" stroke="url(#spiderTankArmor)" stroke-width="2" fill="none"/>
  <!-- Cephalothorax - armored -->
  <ellipse cx="32" cy="18" rx="14" ry="12" fill="url(#spiderTankBody)"/>
  <!-- Armor ridge on head -->
  <path d="M22 12 Q32 8 42 12" stroke="url(#spiderTankArmor)" stroke-width="2.5" fill="none"/>
  <!-- Eyes - yellow/amber -->
  <ellipse cx="26" cy="14" rx="5" ry="5.5" fill="url(#spiderTankEye)"/>
  <ellipse cx="38" cy="14" rx="5" ry="5.5" fill="url(#spiderTankEye)"/>
  <ellipse cx="21" cy="19" rx="2.5" ry="3" fill="#ffaa00"/>
  <ellipse cx="43" cy="19" rx="2.5" ry="3" fill="#ffaa00"/>
  <!-- Mandibles - large -->
  <path d="M28 24 Q26 30 24 32" stroke="#5a5a6a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M36 24 Q38 30 40 32" stroke="#5a5a6a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
