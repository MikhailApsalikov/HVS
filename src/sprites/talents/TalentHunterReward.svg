<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="hrCoin1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <linearGradient id="hrCoin2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#e6a800"/>
    </linearGradient>
    <linearGradient id="hrGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff4a0"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
  </defs>
  <!-- Back coins (shadow) -->
  <ellipse cx="14" cy="32" rx="7" ry="7" fill="#a07000" opacity="0.5"/>
  <ellipse cx="34" cy="32" rx="7" ry="7" fill="#a07000" opacity="0.5"/>
  <!-- Back coins -->
  <circle cx="14" cy="30" r="7" fill="url(#hrCoin1)" stroke="#b8860b" stroke-width="1"/>
  <circle cx="14" cy="30" r="4.5" fill="none" stroke="#fff8" stroke-width="1"/>
  <circle cx="34" cy="30" r="7" fill="url(#hrCoin1)" stroke="#b8860b" stroke-width="1"/>
  <circle cx="34" cy="30" r="4.5" fill="none" stroke="#fff8" stroke-width="1"/>
  <!-- Front coin (larger, centered) -->
  <circle cx="24" cy="26" r="9" fill="url(#hrGlow)" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="24" cy="26" r="6" fill="none" stroke="#fff9" stroke-width="1.2"/>
  <!-- x3 label -->
  <text x="24" y="30" text-anchor="middle" font-family="Arial Black, Arial" font-size="7" font-weight="900" fill="#7a4800" letter-spacing="-0.5">×3</text>
  <!-- Sparkles -->
  <line x1="24" y1="8" x2="24" y2="13" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="10" x2="27.5" y2="14" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="10" x2="20.5" y2="14" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round"/>
</svg>
