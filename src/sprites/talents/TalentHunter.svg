      <stop offset="0%" style="stop-color:#8b6914"/>
      <stop offset="100%" style="stop-color:#4a3008"/>
    </linearGradient>
    <linearGradient id="hunterTarget" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
