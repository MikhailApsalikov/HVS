      <stop offset="30%" style="stop-color:#ffcc00"/>
      <stop offset="70%" style="stop-color:#cc9900"/>
      <stop offset="100%" style="stop-color:#996600"/>
    </linearGradient>
    <linearGradient id="standStar" x1="0%" y1="0%" x2="100%" y2="100%">
