  <path d="M18 38 L20 36 M28 36 L30 38" stroke="url(#freezeCrystal)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M10 18 L12 20 M12 28 L10 30" stroke="url(#freezeCrystal)" stroke-width="1.5" stroke-linecap="round"/>
